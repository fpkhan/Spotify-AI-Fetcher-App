version: '3.8'

services:
  server:
    build: ./server
    ports:
      - "8000:8000"
    environment:
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      # --- CRITICAL FOR RAG SEARCH ---
      - GROQ_API_KEY=${GROQ_API_KEY}
      # --- CRITICAL FOR SPOTIFY FEATURE ---
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      # --- TELLING OLLAMA TO BUST OUT OF DOCKER LOOPBACK ---
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - ./server:/app
      - ./data:/app/data
    # Maps local machine's ports securely inside the docker container engine 
    # to communicate natively with local host applications (Ollama server instance)
    extra_hosts:
      - "host.docker.internal:host-gateway"

  client:
    build: ./client
    ports:
      - "5173:5173"
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server